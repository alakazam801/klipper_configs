# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v2.0. To use this config, the firmware should be compiled for the
# STM32F103 with a "28KiB bootloader" and USB communication. Also,
# select "Enable extra low-level configuration options" and configure
# "GPIO pins to set at micro-controller startup" to "!PA14".

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.


# ================================================================================
# Printer
# ================================================================================

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[static_digital_output usb_pullup_enable]
pins: !PA14

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_35FFD4054246303223770257-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
#max_accel_to_decel: 7000
max_z_velocity: 10
max_z_accel: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 230
homing_speed: 80

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 230
homing_speed: 80

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
#endstop_pin: ^PC2
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0.0
position_min: -3.0
position_max: 250
homing_speed: 20

[safe_z_home]
home_xy_position: 110,110 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 5

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
rotation_distance: 22.724 #for 5mm Shaft Driven Bondtech gearsets
gear_ratio: 50:10 #for standard 10t motor
#gear_ratio: 50:8 #for sherpa mini 8t motor
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor

max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500

heater_pin: PC8
sensor_type: Custom NTC 100k
sensor_pin: PA0
control: pid
pid_kp = 23.145
pid_ki = 1.234
pid_kd = 108.494
min_temp: 0
max_temp: 300
#min_extrude_temp: 0
nozzle_diameter: 0.400
pressure_advance: 0.07666
filament_diameter: 1.750

[thermistor Custom NTC 100k]
temperature1: 25
resistance1: 100000
temperature2: 130
resistance2: 2480
temperature3: 220
resistance3: 280

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
interpolate: True
#run_current: 0.30 #min current, equivalent to 0.42A peak (Peak = RMS/0.707)
run_current: 0.35
#run_current: 0.35 #max current, equivalent to 0.49A peak (Peak = RMS/0.707)
stealthchop_threshold: 0

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
control: pid
pid_kp = 68.226
pid_ki = 1.685
pid_kd = 690.785
min_temp: 0
max_temp: 130

#[heater_fan nozzle_cooling_fan]
[fan]
pin: PC6
kick_start_time: 0.100

[controller_fan Stepper_Driver_Fan]
pin: PC7
#max_power: 1.0
fan_speed: 1.0
idle_timeout: 30
idle_speed: 0.6
stepper:stepper_x,stepper_y,stepper_z

# ================================================================================
# Raspberry MCU (input shaper)
# ================================================================================

[mcu rpi]
serial: /tmp/klipper_host_mcu

[adxl345]
cs_pin: rpi:None

[resonance_tester]
accel_chip: adxl345
probe_points:
    110,110,20  # an example

[input_shaper]
shaper_freq_x: 61.6
shaper_type_x: 2hump_ei
shaper_freq_y: 40.0
shaper_type_y: mzv

[temperature_sensor Raspberry_Pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor SKR_Mini_E3_v2]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# ================================================================================
# BLtouch/Bed Leveling
# ================================================================================

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: 23
y_offset: 3
#z_offset: 1.96
samples: 2
pin_move_time: 0.500
sample_retract_dist: 4.0
speed: 10
probe_with_touch_mode: true
stow_on_each_sample: false

[bed_mesh]
speed: 240
horizontal_move_z: 4
mesh_min: 25, 29
mesh_max: 199, 204
probe_count: 6,6
mesh_pps: 2,2
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
fade_target: 0

[screws_tilt_adjust]
screw1: 6, 32
screw1_name: front left screw
screw2: 176, 32
screw2_name: front right screw
screw3: 6, 201
screw3_name: rear left screw
screw4: 176, 201
screw4_name: rear right screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M3

[filament_switch_sensor Runout_Sensor]
pause_on_runout: True
runout_gcode: PAUSE
insert_gcode: RESUME
#event_delay: 3.0
#pause_delay: 0.5
switch_pin: PC15

# ================================================================================
# Additional Configs
# ================================================================================

# Mainsail settings
[include mainsail.cfg]

# Macros
[include macros.cfg]

#Timelapse
[include timelapse.cfg]

# Display
#[include display.cfg]

